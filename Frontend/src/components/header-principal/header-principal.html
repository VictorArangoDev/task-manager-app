<header class="sticky top-0 z-50 w-full backdrop-blur-md border-b border-slate-200 dark:border-slate-800 ">
<nav class="max-w-full mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Project Aurora</span>
</div>
<div class="hidden md:flex items-center gap-8">
<a class="text-sm font-medium text-slate-600 hover:text-primary dark:text-slate-300 dark:hover:text-white transition-colors" href="#features">Features</a>
<a class="text-sm font-medium text-slate-600 hover:text-primary dark:text-slate-300 dark:hover:text-white transition-colors" href="#pricing">Pricing</a>
<a class="text-sm font-medium text-slate-600 hover:text-primary dark:text-slate-300 dark:hover:text-white transition-colors" href="#about">About</a>
</div>
<div class="flex items-center gap-3">

  <!--  -->
  @if (authService.authStatus() === 'authenticated') {

      <button
        class="flex items-center gap-2 pl-2 pr-1 py-1 border border-slate-200 dark:border-stone-700 rounded-full hover:bg-slate-50 dark:hover:bg-stone-800 transition-colors">
        <span class="text-sm font-medium text-slate-700 dark:text-slate-300 px-2"> {{authService.user()?.username}} </span>
        <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center overflow-hidden">
          <img alt="Avatar" class="w-full h-full object-cover" data-alt="Portrait of a male team member avatar"
            src="https://i.pravatar.cc/100" />
        </div>
      </button>

      <a
      (click)="authService.logout()"
class="hidden sm:flex px-4 py-2 text-sm font-semibold text-primary border border-primary/20 hover:border-primary/50 rounded-lg transition-all">
                    Log Out
                </a>

<!--  -->
  } @else if (authService.authStatus() === 'not-authenticated') {

    <a
    routerLink="/auth/login"
    class="hidden sm:flex px-4 py-2 text-sm font-semibold text-primary border border-primary/20 hover:border-primary/50 rounded-lg transition-all">
                        Login
                    </a>
    <button class="px-5 py-2 text-sm font-semibold text-white bg-primary hover:bg-primary/90 rounded-lg shadow-lg shadow-primary/20 transition-all">
                        Get Started
                    </button>

  }

  <!--  -->

  @else {

    <a
    routerLink="/auth/login"
    class="hidden sm:flex px-4 py-2 text-sm font-semibold text-primary border border-primary/20 hover:border-primary/50 rounded-lg transition-all">
                        ....
                    </a>

  }

</div>
</nav>
</header>
