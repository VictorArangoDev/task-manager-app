    <span
      class="px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider"
      [class]="project().stateProjectTask.name | statusClasses">
      {{project().stateProjectTask.name}}</span>
  </div>
  <h4 class="font-bold text-slate-900 dark:text-white mb-1 group-hover:text-primary transition-colors">
    {{project().name}}</h4>
  <p class="text-sm text-slate-500 dark:text-slate-400 line-clamp-2 mb-4">{{project().description}}</p>


  <div class="grid grid-cols-3 gap-4 mb-6">

      <p class="text-[10px] uppercase font-bold text-slate-400 mb-0.5">Start Date</p>

    </div>
    <div>
      <p class="text-[10px] uppercase font-bold text-slate-400 mb-0.5">Deadline</p>
      <p class="text-xs font-semibold text-slate-700 dark:text-slate-300">{{project().deadline | date:'dd/MM/yyyy' }}</p>
    </div>
