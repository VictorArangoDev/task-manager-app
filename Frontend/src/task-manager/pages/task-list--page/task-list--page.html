
<main class="flex-1 flex flex-col min-w-0 bg-background-light dark:bg-background-dark overflow-hidden">

<div class="px-8 pt-8 pb-4">
<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
<div>
<h2 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Tasks</h2>
<p class="text-slate-500 dark:text-slate-400 mt-1">Manage and track Project Aurora deliverables for Q4.</p>
</div>
<div class="flex items-center gap-3">
<button class="flex items-center gap-2 px-4 py-2 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="m12 16l-5-5l1.4-1.45l2.6 2.6V4h2v8.15l2.6-2.6L17 11zm-6 4q-.825 0-1.412-.587T4 18v-3h2v3h12v-3h2v3q0 .825-.587 1.413T18 20z"/></svg>
                        Export
                    </button>

</div>
</div>
<!-- Filter Toolbar -->
<div class="flex flex-wrap items-center gap-3 mb-6 dark:bg-slate-900 p-3 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
<button class="flex items-center gap-2 px-3 py-1.5 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-lg text-sm font-medium border border-transparent hover:border-slate-300 transition-all">
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M11 18h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1M3 7c0 .55.45 1 1 1h16c.55 0 1-.45 1-1s-.45-1-1-1H4c-.55 0-1 .45-1 1m4 6h10c.55 0 1-.45 1-1s-.45-1-1-1H7c-.55 0-1 .45-1 1s.45 1 1 1"/></svg>
                    All Filters
                </button>
<div class="h-6 w-px bg-slate-200 dark:bg-slate-700 mx-1"></div>
<div class="flex gap-2">
<div class="relative group">
<button class="flex items-center gap-2 px-3 py-1.5 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-xs font-semibold text-slate-600 dark:text-slate-400">
                            Status: <span class="text-slate-900 dark:text-white">All</span>
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 32 32"><path fill="currentColor" d="M8.037 11.166L14.5 22.36c.825 1.43 2.175 1.43 3 0l6.463-11.195c.826-1.43.15-2.598-1.5-2.598H9.537c-1.65 0-2.326 1.17-1.5 2.6z"/></svg>
</button>
</div>
<div class="relative group">
<button class="flex items-center gap-2 px-3 py-1.5 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-xs font-semibold text-slate-600 dark:text-slate-400">
                            Priority: <span class="text-slate-900 dark:text-white">High</span>
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 32 32"><path fill="currentColor" d="M8.037 11.166L14.5 22.36c.825 1.43 2.175 1.43 3 0l6.463-11.195c.826-1.43.15-2.598-1.5-2.598H9.537c-1.65 0-2.326 1.17-1.5 2.6z"/></svg>
</button>
</div>
<div class="relative group">
<button class="flex items-center gap-2 px-3 py-1.5 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-xs font-semibold text-slate-600 dark:text-slate-400">
                            Assignee: <span class="text-slate-900 dark:text-white">Team</span>
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 32 32"><path fill="currentColor" d="M8.037 11.166L14.5 22.36c.825 1.43 2.175 1.43 3 0l6.463-11.195c.826-1.43.15-2.598-1.5-2.598H9.537c-1.65 0-2.326 1.17-1.5 2.6z"/></svg>
</button>
</div>
</div>
<div class="ml-auto flex items-center gap-2 text-xs font-medium text-slate-500">
<span>Sort by:</span>
<button class="text-slate-900 dark:text-white flex items-center gap-1 font-bold">
                        Due Date
                     <svg xmlns="http://www.w3.org/2000/svg" width="11" height="19" viewBox="0 0 9 16"><path fill="currentColor" d="M4.5 13c-.28 0-.5-.22-.5-.5v-9c0-.28.22-.5.5-.5s.5.22.5.5v9c0 .28-.22.5-.5.5"/><path fill="currentColor" d="M4.5 14a.47.47 0 0 1-.35-.15l-3.5-3.5c-.2-.2-.2-.51 0-.71s.51-.2.71 0l3.15 3.15l3.15-3.15c.2-.2.51-.2.71 0s.2.51 0 .71l-3.5 3.5c-.1.1-.23.15-.35.15Z"/></svg>
</button>
</div>
</div>
</div>
<!-- Task Table Area -->
<div class="flex-1 overflow-auto px-8 pb-8">
<div class="dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
<table class="w-full text-left border-collapse min-w-200">
<thead>
<tr class="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-800">


<th class="py-4 px-6 w-12">
<input class="rounded border-slate-300 text-primary focus:ring-primary" type="checkbox"/>
</th>
<th class="py-4 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Task Name</th>
<th class="py-4 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Priority</th>
<th class="py-4 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Due Date</th>
<th class="py-4 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Status</th>
<th class="py-4 px-6 text-right"></th>
</tr>
</thead>
<tbody class="divide-y divide-slate-100 dark:divide-slate-800">
<!-- Task Row 1 -->

  @for (task of tasksResource.value(); track task.id) {


  <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/40 transition-colors group">
<td class="py-4 px-6">
<input class="rounded border-slate-300 text-primary focus:ring-primary" type="checkbox"/>
</td>
<td class="py-4 px-4">
<div class="flex flex-col">
<span class="text-sm font-semibold text-slate-900 dark:text-white">{{task.name}}</span>
</div>
</td>
<td class="py-4 px-4">
<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold tracking-tight"
 [class]="task.priority.name | priority"
>

                                    {{task.priority.name}}
                                </span>
</td>

<div class="flex items-center  gap-2 text-sm font-medium text-slate-600 dark:text-slate-400">

                                    {{task.deadline }}
                                </div>

<td class="py-4 px-4">
<span class="inline-flex items-center px-3 py-1 rounded-lg text-xs font-bold bg-primary/10"
  [class]="task.stateProjectTask.name | statusClasses">
                                   {{task.stateProjectTask.name}}
                                </span>
</td>
<td class="py-4 px-6 text-right">
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M16 12a2 2 0 0 1 2-2a2 2 0 0 1 2 2a2 2 0 0 1-2 2a2 2 0 0 1-2-2m-6 0a2 2 0 0 1 2-2a2 2 0 0 1 2 2a2 2 0 0 1-2 2a2 2 0 0 1-2-2m-6 0a2 2 0 0 1 2-2a2 2 0 0 1 2 2a2 2 0 0 1-2 2a2 2 0 0 1-2-2"/></svg>
</button>
</td>
</tr>
}






</tbody>
</table>
</div>
<!-- Footer / Pagination -->
<div class="flex items-center justify-between mt-6 px-2">
<p class="text-sm text-slate-500 dark:text-slate-400 font-medium">
                    Showing <span class="text-slate-900 dark:text-white font-bold">1-5</span> of <span class="text-slate-900 dark:text-white font-bold">24</span> tasks
                </p>
<div class="flex items-center gap-2">
<button class="size-9 flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-800 dark:bg-slate-900 text-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors disabled:opacity-50" disabled="">
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M14.71 6.71a.996.996 0 0 0-1.41 0L8.71 11.3a.996.996 0 0 0 0 1.41l4.59 4.59a.996.996 0 1 0 1.41-1.41L10.83 12l3.88-3.88c.39-.39.38-1.03 0-1.41"/></svg>
</button>
<button class="size-9 flex items-center justify-center rounded-lg bg-primary text-white font-bold text-sm">1</button>
<button class="size-9 flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-800 dark:bg-slate-900 text-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">2</button>
<button class="size-9 flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-800 dark:bg-slate-900 text-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">3</button>
<button class="size-9 flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-800 dark:bg-slate-900 text-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M9.29 6.71a.996.996 0 0 0 0 1.41L13.17 12l-3.88 3.88a.996.996 0 1 0 1.41 1.41l4.59-4.59a.996.996 0 0 0 0-1.41L10.7 6.7c-.38-.38-1.02-.38-1.41.01"/></svg>
</button>
</div>
</div>
</div>
</main>
