spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        # format_sql: true
        '[format_sql]': true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  # security:
  #   user:
  #     name: admin
  #     password: 1234
  
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

server:
  port: 8080
  error:
    include-message: always